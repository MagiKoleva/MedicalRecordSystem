<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Patient</h1>

        <form th:object="${patient}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>User ID</label>
                <input type="number" th:field="*{userId}">
            </div>

            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}">
            </div>

            <div class="form-group">
                <label>EGN</label>
                <input type="text" th:field="*{egn}">
            </div>

            <div class="form-group">
                <label>Health insurance paid</label>
                <select th:field="*{healthInsurancePaid}">
                    <option th:value="true">Yes</option>
                    <option th:value="false">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>General practitioner</label>
                <select th:field="*{generalPractitioner.userId}">
                    <option th:each="doctor : ${doctors}"
                            th:value="${doctor.userId}"
                            th:text="${doctor.name}">
                    </option>
                </select>
            </div>

            <button class="btn" type="submit">Save</button>
            <a class="btn btn-secondary" th:href="@{/web/patients}">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
