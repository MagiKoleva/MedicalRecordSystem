<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Doctor</h1>

        <form th:object="${doctor}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>User ID</label>
                <input type="number" th:field="*{userId}">
            </div>

            <div class="form-group">
                <label>Doctor identifier</label>
                <input type="text" th:field="*{doctorIdentifier}">
            </div>

            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}">
            </div>

            <div class="form-group">
                <label>General practitioner</label>
                <select th:field="*{generalPractitioner}">
                    <option th:value="true">Yes</option>
                    <option th:value="false">No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Specialties</label>
                <select th:field="*{specialties}" multiple>
                    <option th:each="specialty : ${specialties}"
                            th:value="${specialty.id}"
                            th:text="${specialty.name}">
                    </option>
                </select>
            </div>

            <button class="btn" type="submit">Save</button>
            <a class="btn btn-secondary" th:href="@{/web/doctors}">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
