<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Patient Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-card register-card">
    <h1>Patient Account</h1>
    <p class="auth-subtitle">Create your patient profile</p>

    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

    <form th:action="@{/register/patient}" th:object="${patientRegisterDto}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter password">
        </div>

        <div class="form-group">
            <label>Full name</label>
            <input type="text" th:field="*{name}" placeholder="Maria Petrova">
        </div>

        <div class="form-group">
            <label>EGN</label>
            <input type="text" th:field="*{egn}" placeholder="10 digits">
        </div>

        <div class="form-group">
            <label>Health insurance paid in the last 6 months</label>
            <select th:field="*{healthInsurancePaid}">
                <option th:value="true">Yes</option>
                <option th:value="false">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>General practitioner name</label>
            <input type="text" th:field="*{generalPractitionerName}" placeholder="Dr. Ivan Ivanov">
        </div>

        <button class="btn auth-btn" type="submit">Create patient account</button>
    </form>

    <p class="auth-link">
        Already have an account?
        <a th:href="@{/login}">Login</a>
    </p>
</div>

</body>
</html>
