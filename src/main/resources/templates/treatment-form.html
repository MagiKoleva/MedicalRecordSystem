<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Treatment Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Treatment</h1>

        <form th:object="${treatment}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>Medication</label>
                <input type="text" th:field="*{prescribedMedication}">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}"></textarea>
            </div>

            <div class="form-group">
                <label>Start date</label>
                <input type="date" th:field="*{startDate}">
            </div>

            <div class="form-group">
                <label>End date</label>
                <input type="date" th:field="*{endDate}">
            </div>

            <div class="form-group">
                <label>Visit</label>
                <select th:field="*{visit.id}">
                    <option th:each="visit : ${visits}"
                            th:value="${visit.id}"
                            th:text="${'Visit #' + visit.id}">
                    </option>
                </select>
            </div>

            <button class="btn" type="submit">Save</button>
            <a class="btn btn-secondary" th:href="@{/web/treatments}">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
