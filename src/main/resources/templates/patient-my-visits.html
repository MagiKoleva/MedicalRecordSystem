<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Medical History</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">
    <a th:href="@{/web/patient/dashboard}">Dashboard</a>
    <a th:href="@{/web/patient/my-visits}">My visits</a>
    <a th:href="@{/web/doctors}">Doctors</a>

    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button class="nav-logout" type="submit">Logout</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h1>My Medical History</h1>

        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Doctor</th>
                <th>Diagnosis</th>
                <th>Price</th>
                <th>Paid By</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="visit : ${visits}">
                <td th:text="${visit.date}"></td>
                <td th:text="${visit.doctor != null ? visit.doctor.name : 'No doctor'}"></td>
                <td th:text="${visit.diagnosis != null ? visit.diagnosis.name : 'No diagnosis'}"></td>
                <td th:text="${visit.price}"></td>
                <td th:text="${visit.paidBy}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
