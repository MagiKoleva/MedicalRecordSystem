<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Medical History</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">
    <a th:href="@{/web/patient/dashboard}">Dashboard</a>
    <a th:href="@{/web/patient/my-visits}">My visits</a>
    <a th:href="@{/web/doctors}">Doctors</a>

    <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="logout-btn" type="submit">Log out</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h1>My Medical History</h1>

        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Doctor</th>
                <th>Diagnosis</th>
                <th>Price</th>
                <th>Paid By</th>
                <th>Treatment</th>
                <th>Sick Leave</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="visit : ${visits}">
                <td th:text="${visit.date}"></td>
                <td th:text="${visit.doctor != null ? visit.doctor.name : 'No doctor'}"></td>
                <td th:text="${visit.diagnosis != null ? visit.diagnosis.name : 'No diagnosis'}"></td>
                <td th:text="${visit.price}"></td>
                <td th:text="${visit.paidBy}"></td>

                <td>
                    <span th:if="${visit.treatment != null}">
                        <strong th:text="${visit.treatment.prescribedMedication}"></strong>
                        <br>
                        <small th:text="${visit.treatment.description}"></small>
                    </span>
                    <span th:if="${visit.treatment == null}">No treatment</span>
                </td>

                <td>
                    <span th:if="${visit.sickLeave != null}">
                        From
                        <span th:text="${visit.sickLeave.fromDate}"></span>
                        <br>
                        Days:
                        <span th:text="${visit.sickLeave.days}"></span>
                    </span>
                    <span th:if="${visit.sickLeave == null}">No sick leave</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
