<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Visits</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/web/doctors}">Doctors</a>
    <a th:href="@{/web/patients}">Patients</a>
    <a th:href="@{/web/visits}">Visits</a>
    <a th:href="@{/web/reports}">Reports</a>
</div>

<div class="container">
    <div class="card">
        <h1>Visits</h1>

        <a sec:authorize="hasAuthority('ADMIN')" class="btn" th:href="@{/web/visits/create}">
            Add visit</a>
        <br><br>

        <form th:action="@{/web/visits/filter}" method="get" class="filter-form">
            <select name="doctorId">
                <option value="">All doctors</option>
                <option th:each="doctor : ${doctors}"
                        th:value="${doctor.userId}"
                        th:text="${doctor.name}">
                </option>
            </select>

            <input type="date" name="startDate">
            <input type="date" name="endDate">

            <button class="btn" type="submit">Filter</button>
        </form>
        <br><br>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Date</th>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Diagnosis</th>
                <th>Price</th>
                <th>Paid by</th>
                <th>Treatment</th>
                <th>Sick Leave</th>
                <th sec:authorize="hasAuthority('ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="visit : ${visits}">
                <td th:text="${visit.id}"></td>
                <td th:text="${visit.date}"></td>
                <td th:text="${visit.patient != null ? visit.patient.name : 'No patient'}"></td>
                <td th:text="${visit.doctor != null ? visit.doctor.name : 'No doctor'}"></td>
                <td th:text="${visit.diagnosis != null ? visit.diagnosis.name : 'No diagnosis'}"></td>
                <td th:text="${visit.price}"></td>
                <td th:text="${visit.paidBy}"></td>

                <td>
                    <span th:if="${visit.treatment != null}">
                        <strong th:text="${visit.treatment.prescribedMedication}"></strong>
                        <br>
                        <small th:text="${visit.treatment.description}"></small>
                    </span>
                    <span th:if="${visit.treatment == null}">No treatment</span>
                </td>

                <td>
                    <span th:if="${visit.sickLeave != null}">
                        From
                        <span th:text="${visit.sickLeave.fromDate}"></span>
                        <br>
                        Days:
                        <span th:text="${visit.sickLeave.days}"></span>
                    </span>
                    <span th:if="${visit.sickLeave == null}">No sick leave</span>
                </td>

                <td sec:authorize="hasAuthority('ADMIN')">
                    <a class="btn"
                       th:href="@{/web/visits/edit/{id}(id=${visit.id})}">
                        Edit
                    </a>

                    <a class="btn btn-secondary"
                       th:href="@{/web/visits/delete/{id}(id=${visit.id})}">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
