<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Visit Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Visit</h1>

        <form th:object="${visit}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>Date</label>
                <input type="date" th:field="*{date}">
            </div>

            <div class="form-group">
                <label>Patient</label>
                <select th:field="*{patient.userId}">
                    <option th:each="patient : ${patients}"
                            th:value="${patient.userId}"
                            th:text="${patient.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Doctor</label>
                <select th:field="*{doctor.userId}">
                    <option th:each="doctor : ${doctors}"
                            th:value="${doctor.userId}"
                            th:text="${doctor.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Diagnosis</label>
                <select th:field="*{diagnosis.id}">
                    <option th:each="diagnosis : ${diagnoses}"
                            th:value="${diagnosis.id}"
                            th:text="${diagnosis.name}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="number" step="0.01" th:field="*{price}">
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea th:field="*{notes}"></textarea>
            </div>

            <button class="btn" type="submit">Save</button>
            <a class="btn btn-secondary" th:href="@{/web/visits}">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
