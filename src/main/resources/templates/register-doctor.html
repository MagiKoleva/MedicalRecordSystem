<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

<div class="auth-card register-card">
    <h1>Doctor Account</h1>
    <p class="auth-subtitle">Create your doctor profile</p>

    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>

    <form th:action="@{/register/doctor}" th:object="${doctorRegisterDto}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" placeholder="Enter username">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Enter password">
        </div>

        <div class="form-group">
            <label>Full name</label>
            <input type="text" th:field="*{name}" placeholder="Dr. Ivan Ivanov">
        </div>

        <div class="form-group">
            <label>Doctor identifier</label>
            <input type="text" th:field="*{doctorIdentifier}" placeholder="DOC001">
        </div>

        <div class="form-group">
            <label>General practitioner</label>
            <select th:field="*{generalPractitioner}">
                <option th:value="true">Yes</option>
                <option th:value="false">No</option>
            </select>
        </div>

        <div class="form-group">
            <label>Specialty</label>
            <select th:field="*{specialtyId}">
                <option value="">-- Select specialty --</option>
                <option th:each="specialty : ${specialties}"
                        th:value="${specialty.id}"
                        th:text="${specialty.name}">
                </option>
            </select>
        </div>

        <button class="btn auth-btn" type="submit">Create doctor account</button>
    </form>

    <p class="auth-link">
        Already have an account?
        <a th:href="@{/login}">Login</a>
    </p>
</div>

</body>
</html>
