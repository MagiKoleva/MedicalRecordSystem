<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/web/doctors}">Doctors</a>
    <a th:href="@{/web/patients}">Patients</a>
    <a th:href="@{/web/visits}">Visits</a>
    <a th:href="@{/web/reports}">Reports</a>
</div>

<div class="container">
    <div class="card">
        <h1>Doctors</h1>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Identifier</th>
                <th>Name</th>
                <th>General Practitioner</th>
                <th>Specialties</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="doctor : ${doctors}">
                <td th:text="${doctor.userId}"></td>
                <td th:text="${doctor.doctorIdentifier}"></td>
                <td th:text="${doctor.name}"></td>
                <td th:text="${doctor.generalPractitioner}"></td>

                <td>
        <span th:each="specialty : ${doctor.specialties}">
            <span th:text="${specialty.name}"></span><br>
        </span>
                </td>

                <td>
                    <a class="btn"
                       th:href="@{/web/doctors/edit/{id}(id=${doctor.userId})}">
                        Edit
                    </a>

                    <a class="btn btn-secondary"
                       th:href="@{/web/doctors/delete/{id}(id=${doctor.userId})}">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
