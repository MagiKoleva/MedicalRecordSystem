<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Patients</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR', 'PATIENT')"
       th:href="@{/web/doctors}">Doctors</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR')"
       th:href="@{/web/patients}">Patients</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR')"
       th:href="@{/web/visits}">Visits</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR')"
       th:href="@{/web/reports}">Reports</a>
    <a sec:authorize="hasAuthority('PATIENT')"
       th:href="@{/web/patient/my-visits}">My visits</a>
</div>

<div class="container">
    <div class="card">
        <h1>Patients</h1>

        <form th:action="@{/web/patients/by-diagnosis}" method="get" class="filter-form">
            <select name="diagnosisId">
                <option th:each="diagnosis : ${diagnoses}"
                        th:value="${diagnosis.id}"
                        th:text="${diagnosis.name}">
                </option>
            </select>
            <br>
            <button class="btn" type="submit">Filter by diagnosis</button>
        </form>
        <br><br>

        <form th:action="@{/web/patients/by-general-practitioner}" method="get" class="filter-form">
            <select name="doctorId">
                <option th:each="doctor : ${doctors}"
                        th:value="${doctor.userId}"
                        th:text="${doctor.name}">
                </option>
            </select>
            <br>
            <button class="btn" type="submit">Filter by GP</button>
        </form>
        <br>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>EGN</th>
                <th>Health Insurance</th>
                <th>General Practitioner</th>
                <th sec:authorize="hasAuthority('ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.userId}"></td>
                <td th:text="${patient.name}"></td>
                <td th:text="${patient.egn}"></td>
                <td th:text="${patient.healthInsurancePaid}"></td>
                <td th:text="${patient.generalPractitioner != null ? patient.generalPractitioner.name : 'No GP'}"></td>

                <td sec:authorize="hasAuthority('ADMIN')">
                    <a class="btn"
                       th:href="@{/web/patients/edit/{id}(id=${patient.userId})}">
                        Edit
                    </a>

                    <a class="btn btn-secondary"
                       th:href="@{/web/patients/delete/{id}(id=${patient.userId})}">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
