<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sick Leave Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Sick Leave</h1>

        <form th:object="${sickLeave}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label>From date</label>
                <input type="date" th:field="*{fromDate}">
            </div>

            <div class="form-group">
                <label>Days</label>
                <input type="number" th:field="*{days}">
            </div>

            <div class="form-group">
                <label>Visit</label>
                <select th:field="*{visit.id}">
                    <option th:each="visit : ${visits}"
                            th:value="${visit.id}"
                            th:text="${'Visit #' + visit.id}">
                    </option>
                </select>
            </div>

            <button class="btn" type="submit">Save</button>
            <a class="btn btn-secondary" th:href="@{/web/sick-leaves}">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
