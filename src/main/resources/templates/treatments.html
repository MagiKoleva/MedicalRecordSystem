<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Treatments</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/web/users}">Users</a>
    <a th:href="@{/web/doctors}">Doctors</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR')" th:href="@{/web/patients}">Patients</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR')" th:href="@{/web/visits}">Visits</a>
    <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/web/treatments}">Treatments</a>
    <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/web/sick-leaves}">Sick Leaves</a>
    <a sec:authorize="hasAnyAuthority('ADMIN', 'DOCTOR')" th:href="@{/web/reports}">Reports</a>

    <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="logout-btn" type="submit">Logout</button>
    </form>
</div>

<div class="container">
    <div class="card">
        <h1>Treatments</h1>

        <a sec:authorize="hasAuthority('ADMIN')" class="btn" th:href="@{/web/treatments/create}">
            Add treatment
        </a>

        <br><br>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Medication</th>
                <th>Description</th>
                <th>Start date</th>
                <th>End date</th>
                <th>Visit</th>
                <th sec:authorize="hasAuthority('ADMIN')">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="treatment : ${treatments}">
                <td th:text="${treatment.id}"></td>
                <td th:text="${treatment.prescribedMedication}"></td>
                <td th:text="${treatment.description}"></td>
                <td th:text="${treatment.startDate}"></td>
                <td th:text="${treatment.endDate}"></td>
                <td th:text="${treatment.visit != null ? treatment.visit.id : 'No visit'}"></td>

                <td sec:authorize="hasAuthority('ADMIN')">
                    <a class="btn" th:href="@{/web/treatments/edit/{id}(id=${treatment.id})}">
                        Edit
                    </a>
                    <a class="btn btn-secondary" th:href="@{/web/treatments/delete/{id}(id=${treatment.id})}">
                        Delete
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
